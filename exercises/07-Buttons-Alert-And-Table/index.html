<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width" />
		<link

		<title>07 Buttons, Alert and Table</title>

	<body>

							<tr>
								<th>First</th>
								<th>Last</th>
								<th>Handle</th>
							</tr>
						</thead>
						<tbody>
							<tr>
								<td>Antonio</td>
								<td>Antonio</td>
								<td>Antonio</td>
							</tr>

							<tr>
								<td>Mieres</td>
								<td>Mieres</td>
								<td>Mieres</td>
							</tr>

							<tr>
								<td>@antoniomieres</td>
								<td></td>
								<td>@antoniomieres</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>
	</body>
</html>
